<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const hour = new Date().getHours();
        let greeting;
        if (hour < 12) {
            greeting = "Good morning!";
        } else if (hour < 18) {
            greeting = "Good afternoon!";
        } else {
            greeting = "Good evening!";
        }
        
        const cars = ["Saab", "Volvo", "BMW"];
        let len = cars.length;
        let text = "";
        for (let i = 0; i < len; i++) {
            text += cars[i] + "<br>";
        }
        document.write(greeting + "<br>" + text);
    </script>
</body>
</html>
